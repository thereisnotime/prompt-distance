name: Program Committee
on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  desk-rejection:
    runs-on: ubuntu-latest
    # The committee does not reject itself
    # if: github.actor != github.repository_owner  # temporarily disabled for testing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        with:
          script: |
            const remarks = require('./.github/review-remarks.json');
            const remark = remarks[Math.floor(Math.random() * remarks.length)];
            const isPR = !!context.payload.pull_request;
            const number = isPR ? context.payload.pull_request.number : context.payload.issue.number;
            const kind = isPR ? 'revision' : 'review';
            const body = [
              `Thank you for submitting your ${kind} to the Prompt Distance Program Committee.`,
              '',
              `**Decision:** ${remark}`,
              '',
              '*This decision is final until prompt rot renders it obsolete. The committee thanks you for your service and asks that you do not interpret this as an invitation.*'
            ].join('\n');
            await github.rest.issues.createComment({
              ...context.repo, issue_number: number, body
            });
            await github.rest.issues.update({
              ...context.repo, issue_number: number, state: 'closed',
              ...(isPR ? {} : { state_reason: 'not_planned' })
            });
